name: Claude Security Review

on:
  pull_request:
    branches: [main]
    paths: ['src/**', 'script/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: 'claude-opus-4-6'
          direct_prompt: |
            You are a senior smart contract security auditor. Review the changes in this PR for:

            1. **Critical vulnerabilities**: reentrancy, access control bypasses, integer overflow/underflow, flash loan attacks, oracle manipulation, price manipulation
            2. **DeFi-specific risks**: ERC-4626 share inflation, rounding errors in financial math, front-running, sandwich attacks, MEV extraction
            3. **Solidity best practices**: checks-effects-interactions pattern, proper use of SafeERC20, custom errors vs require strings, event emission
            4. **IL Shield specific**: settlement logic correctness, tranche waterfall ordering, premium streaming accuracy, coverage ramp math, soulbound token enforcement

            For each finding, rate severity (Critical/High/Medium/Low/Info) and suggest a fix.
            If no issues found, confirm the changes are safe with a brief explanation of what was reviewed.
